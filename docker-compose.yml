services:
  rag-search:
    build: .
    # "always" (not "unless-stopped"): the host's podman-restart.service
    # only auto-starts containers on boot when the policy is exactly
    # "always" -- it filters out "unless-stopped".
    restart: always
    env_file:
      - .env
    volumes:
      # Persist the FAISS index cache across container restarts/rebuilds
      # so you don't eat the ~30s cold-build cost on every deploy.
      - index-cache:/app/data/.index_cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  index-cache:
